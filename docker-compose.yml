version: '3.8'

services:
  diffmem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diffmem
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Required: OpenRouter API key for LLM operations
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      
      # Required: GitHub repository configuration
      - GITHUB_REPO_URL=${GITHUB_REPO_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_BRANCH=main
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      
      # Server configuration
      - DEFAULT_MODEL=google/gemini-2.5-pro
      - STORAGE_PATH=/app/storage
      - WORKTREE_ROOT=/app/worktrees
      - SYNC_INTERVAL_MINUTES=5
      - LOG_LEVEL=info
      
      # API Configuration
      - API_KEY=${API_KEY:-}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - PORT=8000
      
      # CORS Configuration
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://difmem.kingbarry.cc,http://192.168.60.108:8000}
    volumes:
      - ./storage:/app/storage
      - ./worktrees:/app/worktrees
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - diffmem-network

networks:
  diffmem-network:
    driver: bridge
